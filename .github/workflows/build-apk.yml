name: Build DiyyMusic v0.7.0 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build optimized installable APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-37" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create persistent debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/persistent-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=DiyyMusic,C=ID"

      - name: Build slim APK
        run: |
          chmod +x gradlew
          ./gradlew --console=plain :app:assembleFossDebug --warning-mode summary
        env:
          DIYYMUSIC_APPLICATION_ID: com.diyy.music
          DIYYMUSIC_APP_NAME: DiyyMusic
          DIYYMUSIC_ABI: armeabi-v7a
          LASTFM_API_KEY: ""
          LASTFM_SECRET: ""

      - name: Upload APK only
        uses: actions/upload-artifact@v4
        with:
          name: DiyyMusic-v0.7.0-APK
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: error
