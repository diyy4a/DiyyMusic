name: Build DiyyMusic v0.10.0 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build optimized installable APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-37" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare persistent debug keystore
        run: |
          set -e
          KEYSTORE="app/persistent-debug.keystore"
          ALIAS="androiddebugkey"

          if [ -f "$KEYSTORE" ] && \
             keytool -list -keystore "$KEYSTORE" -storepass android -alias "$ALIAS" >/dev/null 2>&1; then
            echo "Valid persistent debug keystore already exists; reusing it."
          else
            echo "Persistent debug keystore is missing or invalid; creating a new one."
            rm -f "$KEYSTORE"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE" \
              -storepass android \
              -alias "$ALIAS" \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=DiyyMusic,C=ID"
          fi

      - name: Build slim APK
        run: |
          chmod +x gradlew
          ./gradlew --console=plain :app:assembleFossDebug --warning-mode summary
        env:
          DIYYMUSIC_APPLICATION_ID: com.diyy.music
          DIYYMUSIC_APP_NAME: DiyyMusic
          DIYYMUSIC_ABI: universal
          DISCORD_APP_ID: "1518124516893528125"
          LASTFM_API_KEY: ""
          LASTFM_SECRET: ""

      - name: Upload APK only
        uses: actions/upload-artifact@v4
        with:
          name: DiyyMusic-v0.10.0-APK
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: error
